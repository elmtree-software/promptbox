<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <title>PromptBox</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-group">
        <div class="combo-box" id="project-combo">
          <div class="combo-label-row">
            <label>Project</label>
            <button class="sort-toggle" id="sort-toggle" title="Sort by last modified" style="display: none;">
              <span class="sort-label" id="sort-label">Recent</span>
            </button>
          </div>
          <div class="combo-wrapper">
            <input type="text" id="project-input" placeholder="Enter project name...">
            <button class="combo-toggle" id="project-toggle">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <ul class="combo-dropdown" id="project-dropdown"></ul>
          </div>
        </div>
        <div class="combo-box" id="path-combo">
          <label>Data Path</label>
          <div class="combo-wrapper">
            <input type="text" id="path-input" placeholder="./data">
            <button class="combo-toggle" id="path-toggle">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M1 3.5C1 2.67 1.67 2 2.5 2H5l1 1.5h3.5c.83 0 1.5.67 1.5 1.5v4c0 .83-.67 1.5-1.5 1.5h-7C1.67 10.5 1 9.83 1 9V3.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="toolbar-actions">
        <button class="btn btn-orange" id="clear-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Clear Text
        </button>
        <div id="history-nav">
          <button class="btn btn-blue" id="previous-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Previous Prompt
          </button>
          <div class="history-nav-split" id="history-nav-split">
            <button class="btn btn-blue btn-split-left" id="prev-split-btn">&lt; Previous</button>
            <button class="btn btn-blue btn-split-right" id="next-btn">Next &gt;</button>
          </div>
        </div>
        <button class="btn btn-pink" id="archive-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12v1H2V4z" fill="currentColor"/>
            <path d="M3 5v8.5c0 .83.67 1.5 1.5 1.5h7c.83 0 1.5-.67 1.5-1.5V5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 8h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          To Clipboard & Archive
        </button>
      </div>
    </header>
    <main class="editor-container">
      <div id="editor"></div>
    </main>
    <div class="toast" id="toast"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
